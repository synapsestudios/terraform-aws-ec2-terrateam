name: Terraform Tests

on:
  pull_request:
  workflow_dispatch:

# Least-privilege default: both jobs only read the repo and run terraform.
# Static-key AWS auth needs no id-token; GitHub reports job status as checks
# regardless of token permissions.
permissions:
  contents: read

# Supersede stale Fast Checks when a PR is pushed again, but never cancel a
# dispatched Slow Checks run mid-apply — that would orphan real AWS infra.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fast-checks:
    name: Fast Checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.13.4
      - name: terraform fmt
        run: terraform fmt -recursive -check
      - name: terraform init
        run: terraform init -test-directory=tests/unit
      - name: terraform validate
        run: terraform validate
      - name: terraform test
        run: terraform test -test-directory=tests/unit

  slow-checks:
    name: Slow Checks
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-west-2
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.13.4
      - name: terraform init
        run: terraform init -test-directory=tests/integration
      - name: terraform test
        run: terraform test -test-directory=tests/integration
