name: Terraform Tests

on:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly canary (Mondays 16:17 UTC): re-run the fast lane against the latest
    # AWS provider so a breaking new release is caught even before Dependabot
    # opens a lock-bump PR.
    - cron: "17 16 * * 1"

# Least-privilege default: both jobs only read the repo and run terraform.
# Static-key AWS auth needs no id-token; GitHub reports job status as checks
# regardless of token permissions.
permissions:
  contents: read

# Supersede stale Fast Checks when a PR is pushed again, but never cancel a
# dispatched Slow Checks run mid-apply — that would orphan real AWS infra.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fast-checks:
    name: Fast Checks (${{ matrix.provider }})
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Validate the module's `>= 5.0` floor at BOTH ends, plus the reproducible
        # locked version. `locked` uses the committed lock; `floor`/`latest`
        # re-resolve. mock_provider means no AWS creds are needed, while validate
        # and the unit tests still load the real provider schema — so a v5 -> v6
        # schema break surfaces here cheaply, before it reaches the real-infra lane.
        provider: [locked, floor, latest]
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.13.4
      - name: terraform fmt
        run: terraform fmt -recursive -check
      - name: Resolve provider (${{ matrix.provider }})
        run: |
          set -euo pipefail
          case "${{ matrix.provider }}" in
            locked)
              # Reproducible: use the committed lock as-is.
              terraform init -test-directory=tests/unit
              ;;
            floor)
              # Force the lowest version the `>= 5.0` floor allows and re-resolve,
              # ignoring the committed lock — proves the declared floor is honest.
              sed -i 's/version = ">= 5.0"/version = "= 5.0.0"/' versions.tf
              rm -f .terraform.lock.hcl
              terraform init -upgrade -test-directory=tests/unit
              ;;
            latest)
              # Newest provider satisfying the floor — the compatibility canary.
              rm -f .terraform.lock.hcl
              terraform init -upgrade -test-directory=tests/unit
              ;;
          esac
      - name: terraform validate
        run: terraform validate
      - name: terraform test
        run: terraform test -test-directory=tests/unit

  slow-checks:
    name: Slow Checks
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-west-2
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.13.4
      # The integration suite is a self-contained root module (VPC + EBS + SSM +
      # the module under test) under tests/integration, so it runs from there —
      # unlike the unit suite, which tests this repo's root module via mock_provider.
      - name: terraform init
        working-directory: tests/integration
        run: terraform init
      - name: terraform test
        working-directory: tests/integration
        run: terraform test
